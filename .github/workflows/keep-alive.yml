name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping studiobee
        run: |
          echo "Pinging studiobee.onrender.com..."
          curl -s --max-time 60 https://studiobee.onrender.com/ping || echo "Cold start or timeout — server is booting, next ping will succeed."
